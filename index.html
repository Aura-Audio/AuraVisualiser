<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AuraVisualiser Pro — Render v2</title>
<style>
:root{
  --bg:#141419; --panel:#1d1d27; --panel2:#262634; --text:#e9e9f2; --dim:#7c7c95;
  --accent:#00d2ff; --accent2:#ff3270; --border:#34344a; --r:8px;
  --font:'Segoe UI',system-ui,-apple-system,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--bg);color:var(--text);display:flex}

/* Overlay */
#overlay{position:fixed;inset:0;background:rgba(0,0,0,.93);display:flex;flex-direction:column;
  gap:12px;justify-content:center;align-items:center;z-index:2000;transition:opacity .4s}
#overlay.gone{opacity:0;pointer-events:none}
#overlay h1{font-size:2.4rem;font-weight:800;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
#overlay p{color:var(--dim);font-size:.85rem}
#go{padding:14px 38px;font-size:1.1rem;font-weight:700;border:none;border-radius:var(--r);cursor:pointer;
  background:linear-gradient(135deg,var(--accent),#0090cc);color:#000;transition:transform .15s,box-shadow .15s}
#go:hover{transform:scale(1.06);box-shadow:0 0 26px rgba(0,210,255,.45)}

/* Sidebar */
#side{width:312px;min-width:312px;background:var(--panel);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow-y:auto;scrollbar-width:thin}
#side::-webkit-scrollbar{width:5px}
#side::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.brand{padding:18px 20px 6px;text-align:center;font-size:1.35rem;font-weight:800;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.tagline{text-align:center;font-size:.68rem;color:var(--dim);padding-bottom:12px;border-bottom:1px solid var(--border)}
.cg{padding:13px 20px;border-bottom:1px solid var(--border)}
.cg h3{font-size:.7rem;text-transform:uppercase;letter-spacing:1.4px;color:var(--dim);margin-bottom:10px}
.cg label{font-size:.79rem;display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.cg label span{color:var(--accent);font-weight:600;font-variant-numeric:tabular-nums}
select,input[type=range]{width:100%;padding:7px 8px;border-radius:5px;background:var(--bg);
  color:#fff;border:1px solid var(--border);font-size:.82rem;outline:none}
select:focus{border-color:var(--accent)}
input[type=range]{-webkit-appearance:none;height:6px;padding:0;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;
  background:var(--accent);border:2px solid #fff;cursor:pointer}
.row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.row label{margin:0;flex:1}
input[type=color]{width:36px;height:28px;border:1px solid var(--border);border-radius:5px;background:none;cursor:pointer;padding:1px}
.btns{display:flex;gap:7px;flex-wrap:wrap}
.b{flex:1;min-width:60px;padding:8px 5px;font-size:.72rem;font-weight:600;border:1px solid var(--border);
  border-radius:var(--r);background:var(--panel2);color:var(--text);cursor:pointer;text-align:center;
  transition:background .15s,border-color .15s,color .15s}
.b:hover{border-color:var(--accent);background:#30304a}
.b.on{background:var(--accent);color:#000;border-color:var(--accent)}
.b.warn:hover{border-color:var(--accent2);color:var(--accent2)}
.chk{display:flex;align-items:center;gap:7px;font-size:.78rem;margin-bottom:6px;cursor:pointer}
.chk input{width:auto;accent-color:var(--accent)}
.foot{margin-top:auto;padding:10px 20px;font-size:.67rem;color:var(--dim);
  border-top:1px solid var(--border);display:flex;justify-content:space-between}

/* Stage */
#stage{flex:1;position:relative;background:#000;overflow:hidden;
  border-radius:0;box-shadow:inset 0 0 120px rgba(0,0,0,.9)}
#cv{display:block;width:100%;height:100%}
/* vignette */
#stage::after{content:"";position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(ellipse at center,transparent 55%,rgba(0,0,0,.55) 100%)}
/* axis chips */
.chip{position:absolute;pointer-events:none;font-size:.72rem;font-weight:600;color:#fff;
  background:rgba(0,0,0,.55);padding:3px 9px;border-radius:5px;backdrop-filter:blur(2px);
  letter-spacing:.5px;transition:opacity .3s}
.chip.hide{opacity:0}
#chip-top{top:10px;left:50%;transform:translateX(-50%)}
#chip-bot{bottom:10px;left:50%;transform:translateX(-50%)}
#chip-l{left:8px;top:50%;transform:translateY(-50%) rotate(-90deg);transform-origin:center}
#chip-r{right:8px;top:50%;transform:translateY(-50%) rotate(90deg);transform-origin:center}
#hud{position:absolute;top:10px;right:14px;font-size:.7rem;color:rgba(255,255,255,.4);
  font-variant-numeric:tabular-nums;pointer-events:none}
#modehud{position:absolute;top:10px;left:14px;font-size:.7rem;color:rgba(255,255,255,.32);
  pointer-events:none;text-transform:uppercase;letter-spacing:1.5px}
</style>
</head>
<body>

<div id="overlay">
  <h1>AuraVisualiser Pro</h1>
  <button id="go">▶&ensp;Initialize Audio Engine</button>
  <p>Required by browser autoplay policy — click to begin</p>
</div>

<aside id="side">
  <div class="brand">AuraVisualiser Pro</div>
  <div class="tagline">Smooth Render Engine · v2</div>

  <div class="cg">
    <h3>Transport</h3>
    <div class="btns">
      <button class="b" id="bPause">⏸ Pause</button>
      <button class="b warn" id="bStop">⏹ Stop</button>
      <button class="b" id="bShot">📷 Capture</button>
    </div>
    <label style="margin-top:10px">Master Volume <span id="vVol">15%</span></label>
    <input type="range" id="sVol" min="0" max="100" value="15">
  </div>

  <div class="cg">
    <h3>Audio Scenario</h3>
    <select id="selScene"></select>
  </div>

  <div class="cg">
    <h3>Scenario Parameters</h3>
    <label id="lP1">P1 <span id="vP1">0</span></label>
    <input type="range" id="sP1">
    <label id="lP2" style="margin-top:10px">P2 <span id="vP2">0</span></label>
    <input type="range" id="sP2">
  </div>

  <div class="cg">
    <h3>Visualisation Mode</h3>
    <div class="btns" id="modes">
      <button class="b on" data-m="spectrum">Spectrum</button>
      <button class="b" data-m="spectro">Spectrogram</button>
      <button class="b" data-m="wave">Wave</button>
      <button class="b" data-m="radial">Radial</button>
      <button class="b" data-m="particles">Particles</button>
    </div>
  </div>

  <div class="cg">
    <h3>Render Quality</h3>
    <label class="chk"><input type="checkbox" id="cSmooth" checked> Smooth Envelope Curve</label>
    <label class="chk"><input type="checkbox" id="cGlow" checked> Bloom / Glow</label>
    <label class="chk"><input type="checkbox" id="cPeak" checked> Peak-Hold Caps</label>
    <label class="chk"><input type="checkbox" id="cMark" checked> Dominant-Freq Marker</label>
    <label class="chk"><input type="checkbox" id="cLog"> Logarithmic Frequency</label>
    <label class="chk"><input type="checkbox" id="cAxis" checked> Axis Label Chips</label>
    <label style="margin-top:6px">Persistence (Trail) <span id="vTrail">0.12</span></label>
    <input type="range" id="sTrail" min="0.02" max="1" step="0.01" value="0.12">
  </div>

  <div class="cg">
    <h3>Visual Presets</h3>
    <select id="selPreset"></select>
  </div>

  <div class="cg">
    <h3>Custom Styling</h3>
    <div class="row"><input type="color" id="cBg"><label>Background</label></div>
    <div class="row"><input type="color" id="cBar"><label>Body Colour</label></div>
    <div class="row"><input type="color" id="cPeak"><label>Peak / Live Edge</label></div>
  </div>

  <div class="foot"><span id="stTxt">Ready</span><span id="stFps">-- FPS</span></div>
</aside>

<main id="stage">
  <canvas id="cv"></canvas>
  <div class="chip" id="chip-top">Volume: High</div>
  <div class="chip" id="chip-bot">Volume: Low</div>
  <div class="chip" id="chip-l">0Hz</div>
  <div class="chip" id="chip-r">24000Hz</div>
  <div id="hud"></div>
  <div id="modehud">SPECTRUM</div>
</main>

<script>
/* ===================== CONFIG ===================== */
const SCENES={
 sweep:{name:"Sine Sweep (Sonar)",p1:{l:"Sweep Duration (s)",min:.5,max:10,step:.1,d:2},p2:{l:"Max Freq (Hz)",min:1000,max:20000,step:100,d:10000}},
 concurrent:{name:"Concurrent Harmonics",p1:{l:"Fundamental (Hz)",min:50,max:1000,step:1,d:220},p2:{l:"Harmonic Count",min:1,max:12,step:1,d:5}},
 detune:{name:"Dual Detuned (Beating)",p1:{l:"Base Freq (Hz)",min:100,max:2000,step:10,d:440},p2:{l:"Detune Spread (Hz)",min:.1,max:50,step:.1,d:5}},
 noise:{name:"Rhythmic Noise Burst",p1:{l:"Burst Interval (ms)",min:50,max:1000,step:10,d:200},p2:{l:"Filter Cutoff (Hz)",min:500,max:15000,step:100,d:5000}},
 fm:{name:"FM Synthesis (Bell)",p1:{l:"Carrier Freq (Hz)",min:100,max:2000,step:10,d:400},p2:{l:"Mod Index",min:1,max:5000,step:10,d:1000}},
 sub:{name:"Sub Bass Pulse",p1:{l:"Sub Freq (Hz)",min:20,max:120,step:1,d:50},p2:{l:"Pulse Rate (Hz)",min:.5,max:20,step:.5,d:4}}
};
const PRESETS={
 aura:{name:"Aura Forge (red / yellow)",bg:"#0c0c0c",bar:"#d23250",peak:"#ffe23a",trail:.12},
 cyberpunk:{name:"Cyberpunk (red / cyan)",bg:"#080812",bar:"#c0284a",peak:"#22e0e0",trail:.10},
 ocean:{name:"Deep Ocean (red / cyan)",bg:"#000b18",bar:"#b02848",peak:"#00ffcc",trail:.14},
 ember:{name:"Ember Glow",bg:"#0d0000",bar:"#ff4400",peak:"#ffcc33",trail:.13},
 matrix:{name:"Terminal Matrix",bg:"#001100",bar:"#0a6a0a",peak:"#7dff7d",trail:.20},
 sunset:{name:"Synthwave Sunset",bg:"#160016",bar:"#ff5500",peak:"#ffd24a",trail:.10},
 arctic:{name:"Arctic Aurora",bg:"#020810",bar:"#1f9c8a",peak:"#bdeeff",trail:.16},
 mono:{name:"Monochrome Lab",bg:"#f2f2f2",bar:"#888888",peak:"#101010",trail:.30}
};

/* ===================== STATE ===================== */
let AC,AN,MG,freqD,timeD,noiseBuf;
let nodes=[],timers=[];
let scene='sweep', mode='spectrum', paused=false;
let col={bg:'#0c0c0c',bar:'#d23250',peak:'#ffe23a',trail:.12};
let opt={smooth:true,glow:true,peak:true,mark:true,log:false,axis:true};
let peakH=new Float32Array(0), peakDc=new Float32Array(0);
let particles=[];
let fpsN=0,fpsT=performance.now(),fps=0;

const cv=document.getElementById('cv'), X=cv.getContext('2d');
let W,H,DPR;

// spectrogram ring buffer
let spec=null, specX=null, specW=0, specH=0, writeX=0;

/* ===================== BOOT ===================== */
document.getElementById('go').onclick=()=>{
  document.getElementById('overlay').classList.add('gone');
  initAudio(); buildUI(); resize(); applyPreset('aura'); loadScene('sweep'); loop();
};
addEventListener('resize',resize);
function resize(){
  DPR=devicePixelRatio||1;
  W=cv.clientWidth; H=cv.clientHeight;
  cv.width=W*DPR; cv.height=H*DPR; X.setTransform(DPR,0,0,DPR,0,0);
  // rebuild spectrogram buffer
  specW=W; specH=H;
  spec=document.createElement('canvas'); spec.width=specW; spec.height=specH;
  specX=spec.getContext('2d'); writeX=0;
  X.imageSmoothingEnabled=true;
}

/* ===================== AUDIO ===================== */
function initAudio(){
  AC=new (window.AudioContext||window.webkitAudioContext)();
  AN=AC.createAnalyser(); MG=AC.createGain();
  AN.fftSize=4096; AN.smoothingTimeConstant=.82;
  MG.gain.value=.15; MG.connect(AN); AN.connect(AC.destination);
  freqD=new Uint8Array(AN.frequencyBinCount);
  timeD=new Uint8Array(AN.fftSize);
  const n=AC.sampleRate*2; noiseBuf=AC.createBuffer(1,n,AC.sampleRate);
  const d=noiseBuf.getChannelData(0); for(let i=0;i<n;i++)d[i]=Math.random()*2-1;
}
function kill(){
  timers.forEach(clearInterval); timers=[];
  nodes.forEach(({n,g})=>{try{n.stop()}catch(_){}try{n.disconnect()}catch(_){}if(g)try{g.disconnect()}catch(_){}});
  nodes=[];
}
function add(n,g){nodes.push({n,g});}

function runScene(t){
  kill(); const s=SCENES[t], p1=s._p1??s.p1.d, p2=s._p2??s.p2.d, now=AC.currentTime;
  switch(t){
   case 'sweep':{
     const o=AC.createOscillator(); o.type='sine';
     o.frequency.setValueAtTime(40,now);
     o.frequency.exponentialRampToValueAtTime(Math.max(p2,50),now+p1);
     o.connect(MG); o.start(); add(o);
     timers.push(setInterval(()=>{const n=AC.currentTime;o.frequency.cancelScheduledValues(n);
       o.frequency.setValueAtTime(40,n);o.frequency.exponentialRampToValueAtTime(Math.max(p2,50),n+p1);},p1*1000+80));
     break;}
   case 'concurrent':{
     for(let i=1;i<=p2;i++){const o=AC.createOscillator(),g=AC.createGain();o.type='sine';
       o.frequency.value=p1*i;g.gain.value=1/i;o.connect(g);g.connect(MG);o.start();add(o,g);}
     break;}
   case 'detune':{
     const a=AC.createOscillator(),b=AC.createOscillator();a.frequency.value=p1;b.frequency.value=p1+p2;
     a.connect(MG);b.connect(MG);a.start();b.start();add(a);add(b);break;}
   case 'noise':{
     timers.push(setInterval(()=>{
       const src=AC.createBufferSource(),f=AC.createBiquadFilter(),e=AC.createGain();
       src.buffer=noiseBuf;f.type='lowpass';f.frequency.value=p2;f.Q.value=1.2;const dur=p1/1000;
       e.gain.setValueAtTime(1,AC.currentTime);e.gain.exponentialRampToValueAtTime(.001,AC.currentTime+dur*.85);
       src.connect(f);f.connect(e);e.connect(MG);src.start();src.stop(AC.currentTime+dur);
       src.onended=()=>{const i=nodes.findIndex(x=>x.n===src);if(i>-1)nodes.splice(i,1);
         try{src.disconnect();f.disconnect();e.disconnect()}catch(_){}};
       add(src,e);},p1));
     break;}
   case 'fm':{
     const c=AC.createOscillator(),m=AC.createOscillator(),mg=AC.createGain();
     c.frequency.value=p1;m.frequency.value=p1*.501;mg.gain.value=p2;
     m.connect(mg);mg.connect(c.frequency);c.connect(MG);m.start();c.start();add(c);add(m,mg);break;}
   case 'sub':{
     const o=AC.createOscillator(),g=AC.createGain(),l=AC.createOscillator(),lg=AC.createGain();
     o.type='sine';o.frequency.value=p1;g.gain.value=.5;l.type='sine';l.frequency.value=p2;lg.gain.value=.5;
     l.connect(lg);lg.connect(g.gain);o.connect(g);g.connect(MG);o.start();l.start();add(o,g);add(l,lg);break;}
  }
  setStatus('Playing · '+SCENES[t].name);
}

/* ===================== UI ===================== */
function buildUI(){
  const ss=document.getElementById('selScene'),ps=document.getElementById('selPreset');
  for(const[k,v]of Object.entries(SCENES))ss.add(new Option(v.name,k));
  for(const[k,v]of Object.entries(PRESETS))ps.add(new Option(v.name,k));
  ss.onchange=e=>loadScene(e.target.value);
  ps.onchange=e=>applyPreset(e.target.value);

  const s1=document.getElementById('sP1'),s2=document.getElementById('sP2');
  s1.oninput=e=>{SCENES[scene]._p1=+e.target.value;document.getElementById('vP1').textContent=e.target.value;runScene(scene);};
  s2.oninput=e=>{SCENES[scene]._p2=+e.target.value;document.getElementById('vP2').textContent=e.target.value;runScene(scene);};

  const sv=document.getElementById('sVol');
  sv.oninput=e=>{MG.gain.setTargetAtTime(e.target.value/100,AC.currentTime,.02);document.getElementById('vVol').textContent=e.target.value+'%';};

  document.getElementById('cBg').oninput=e=>col.bg=e.target.value;
  document.getElementById('cBar').oninput=e=>col.bar=e.target.value;
  document.getElementById('cPeak').oninput=e=>col.peak=e.target.value;
  document.getElementById('sTrail').oninput=e=>{col.trail=+e.target.value;document.getElementById('vTrail').textContent=(+e.target.value).toFixed(2);};

  const bind=(id,key)=>document.getElementById(id).onchange=e=>opt[key]=e.target.checked;
  bind('cSmooth','smooth');bind('cGlow','glow');bind('cPeak','peak');bind('cMark','mark');bind('cLog','log');
  document.getElementById('cAxis').onchange=e=>{opt.axis=e.target.checked;syncChips();};

  document.querySelectorAll('#modes .b').forEach(b=>b.onclick=()=>{
    document.querySelectorAll('#modes .b').forEach(x=>x.classList.remove('on'));
    b.classList.add('on'); mode=b.dataset.m;
    document.getElementById('modehud').textContent=mode.toUpperCase();
    particles=[]; if(mode==='spectro'){specX.clearRect(0,0,specW,specH);writeX=0;}
    syncChips();
  });

  document.getElementById('bPause').onclick=function(){paused=!paused;
    this.textContent=paused?'▶ Resume':'⏸ Pause';this.classList.toggle('on',paused);
    paused?AC.suspend():AC.resume();setStatus(paused?'Paused':'Resumed');};
  document.getElementById('bStop').onclick=()=>{kill();setStatus('Stopped');};
  document.getElementById('bShot').onclick=()=>{const a=document.createElement('a');
    a.download='aura_'+Date.now()+'.png';a.href=cv.toDataURL('image/png');a.click();};

  addEventListener('keydown',e=>{if(/INPUT|SELECT/.test(e.target.tagName))return;
    if(e.key===' '){e.preventDefault();document.getElementById('bPause').click();}
    if(e.key==='s')document.getElementById('bShot').click();});
}
function loadScene(t){
  scene=t;const s=SCENES[t];if(s._p1===undefined)s._p1=s.p1.d;if(s._p2===undefined)s._p2=s.p2.d;
  document.getElementById('lP1').innerHTML=`${s.p1.l} <span id="vP1">${s._p1}</span>`;
  const a=document.getElementById('sP1');a.min=s.p1.min;a.max=s.p1.max;a.step=s.p1.step;a.value=s._p1;
  document.getElementById('lP2').innerHTML=`${s.p2.l} <span id="vP2">${s._p2}</span>`;
  const b=document.getElementById('sP2');b.min=s.p2.min;b.max=s.p2.max;b.step=s.p2.step;b.value=s._p2;
  runScene(t);
}
function applyPreset(k){const p=PRESETS[k];col.bg=p.bg;col.bar=p.bar;col.peak=p.peak;col.trail=p.trail;
  document.getElementById('cBg').value=p.bg;document.getElementById('cBar').value=p.bar;
  document.getElementById('cPeak').value=p.peak;document.getElementById('sTrail').value=p.trail;
  document.getElementById('vTrail').textContent=p.trail.toFixed(2);}
function setStatus(t){document.getElementById('stTxt').textContent=t;}
function syncChips(){
  const show=opt.axis && (mode==='spectrum'||mode==='wave');
  document.querySelectorAll('.chip').forEach(c=>c.classList.toggle('hide',!show));
}

/* ===================== HELPERS ===================== */
function rgb(h){const r=/^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(h);
  return r?[parseInt(r[1],16),parseInt(r[2],16),parseInt(r[3],16)]:[0,0,0];}
function mix(a,b,t){return [a[0]+(b[0]-a[0])*t,a[1]+(b[1]-a[1])*t,a[2]+(b[2]-a[2])*t];}
// ember / magma style LUT matching the captures (black→red→orange→yellow→white)
const LUT=[[0,0,0],[20,2,12],[120,12,32],[210,40,60],[240,110,40],[250,205,70],[255,250,225]];
function cmap(t){t=Math.max(0,Math.min(1,t));const s=t*(LUT.length-1);const i=Math.floor(s);const f=s-i;
  const a=LUT[i],b=LUT[Math.min(i+1,LUT.length-1)];const c=mix(a,b,f);return c;}
// map screen index → FFT bin (log or linear)
function binAt(i,n,N){const f=opt.log?(20*Math.pow(20000/20,i/n)):((i/n)*(N));return Math.min(N-1,Math.round(f));}

/* ===================== LOOP ===================== */
function loop(){
  requestAnimationFrame(loop);
  fpsN++;const now=performance.now();
  if(now-fpsT>=500){fps=Math.round(fpsN/((now-fpsT)/1000));fpsN=0;fpsT=now;
    document.getElementById('stFps').textContent=fps+' FPS';document.getElementById('hud').textContent=fps+' FPS';}
  if(paused)return;
  AN.getByteFrequencyData(freqD); AN.getByteTimeDomainData(timeD);
  const N=AN.frequencyBinCount, bg=rgb(col.bg);

  if(mode==='spectro'){ drawSpectro(N,bg); return; }

  // persistence trail (the phosphor effect)
  X.fillStyle=`rgba(${bg[0]},${bg[1]},${bg[2]},${col.trail})`;
  X.fillRect(0,0,W,H);

  X.save();
  if(mode==='spectrum') drawSpectrum(N);
  else if(mode==='wave') drawWave();
  else if(mode==='radial') drawRadial(N);
  else if(mode==='particles') drawParticles(N);
  X.restore();
}

/* ---------- SMOOTH SPECTRUM (matches captures) ---------- */
function drawSpectrum(N){
  const pts=Math.min(512,Math.max(64,Math.floor(W/2)));
  const barC=rgb(col.bar), peakC=rgb(col.peak);
  const env=new Array(pts);
  let maxV=0,maxX=0;
  for(let i=0;i<pts;i++){
    const b=binAt(i,pts,Math.floor(N*0.85));   // ignore top empty bins
    const v=freqD[b]/255;
    env[i]=v; if(v>maxV){maxV=v;maxX=i;}
  }
  const xOf=i=>i/(pts-1)*W;
  const yOf=v=>H-v*H;

  // peak-hold bookkeeping
  if(peakH.length!==pts){peakH=new Float32Array(pts);peakDc=new Float32Array(pts);}

  // ---- filled body (bar colour so persistence reads as the red flames) ----
  const g=X.createLinearGradient(0,H,0,0);
  g.addColorStop(0,`rgba(${barC[0]},${barC[1]},${barC[2]},0)`);
  g.addColorStop(.45,`rgba(${barC[0]},${barC[1]},${barC[2]},.55)`);
  g.addColorStop(1,`rgba(${barC[0]},${barC[1]},${barC[2]},.95)`);
  X.fillStyle=g;
  X.beginPath(); X.moveTo(0,H);
  traceTop(env,xOf,yOf);
  X.lineTo(W,H); X.closePath(); X.fill();

  // ---- glowing live edge (peak colour → the yellow spikes / cyan line) ----
  X.lineJoin='round'; X.lineCap='round';
  if(opt.glow){X.shadowBlur=16;X.shadowColor=col.peak;}
  X.strokeStyle=col.peak; X.lineWidth=2;
  X.beginPath(); traceTop(env,xOf,yOf,true); X.stroke();
  // hot white core for the brightest tips
  X.shadowBlur=0; X.strokeStyle=`rgba(255,255,255,.55)`; X.lineWidth=1;
  X.beginPath(); traceTop(env,xOf,yOf,true); X.stroke();

  // ---- peak-hold caps ----
  if(opt.peak){
    X.shadowBlur=0;
    for(let i=0;i<pts;i++){
      if(env[i]>peakH[i]){peakH[i]=env[i];peakDc[i]=0;}
      else{peakDc[i]+=.0035;peakH[i]=Math.max(0,peakH[i]-peakDc[i]);}
      const py=yOf(peakH[i]);
      X.fillStyle=`rgba(${peakC[0]},${peakC[1]},${peakC[2]},.85)`;
      X.fillRect(xOf(i)-1,py,Math.max(2,W/pts-1),2);
    }
  }

  // ---- dominant-frequency marker ----
  if(opt.mark && maxV>.05){
    const mx=xOf(maxX);
    X.save();
    if(opt.glow){X.shadowBlur=12;X.shadowColor=col.peak;}
    X.strokeStyle=`rgba(${peakC[0]},${peakC[1]},${peakC[2]},.35)`;
    X.lineWidth=1; X.setLineDash([4,5]);
    X.beginPath();X.moveTo(mx,0);X.lineTo(mx,H);X.stroke();
    X.restore();
  }
}
// trace the smoothed top envelope; open=true skips the closing segments
function traceTop(env,xOf,yOf,open){
  const P=env.map((v,i)=>({x:xOf(i),y:yOf(v)}));
  if(!open) X.lineTo(P[0].x,P[0].y); else X.moveTo(P[0].x,P[0].y);
  if(opt.smooth){
    for(let i=0;i<P.length-1;i++){
      const xc=(P[i].x+P[i+1].x)/2, yc=(P[i].y+P[i+1].y)/2;
      X.quadraticCurveTo(P[i].x,P[i].y,xc,yc);
    }
    X.lineTo(P[P.length-1].x,P[P.length-1].y);
  }else{
    for(let i=1;i<P.length;i++)X.lineTo(P[i].x,P[i].y);
  }
}

/* ---------- SCROLLING SPECTROGRAM (bonus) ---------- */
function drawSpectro(N,bg){
  // build one vertical column from current spectrum
  const colImg=specX.createImageData(1,specH);
  const usable=Math.floor(N*0.85);
  for(let y=0;y<specH;y++){
    const frac=1-y/specH;                       // top = high freq
    const b=opt.log?Math.round(Math.log(20+frac*20000)/Math.log(20000/20+1)*0+ (Math.pow(20000/20,frac))*usable/20000*usable)
                   :Math.min(usable-1,Math.round(frac*usable));
    const bb=Math.max(0,Math.min(usable-1, opt.log? Math.round((Math.pow(20000/20,frac)-1)/(20000/20-1)*usable):b));
    const v=freqD[bb]/255;
    const c=cmap(Math.pow(v,.85));
    const o=y*4; colImg.data[o]=c[0];colImg.data[o+1]=c[1];colImg.data[o+2]=c[2];colImg.data[o+3]=255;
  }
  specX.putImageData(colImg,writeX,0);
  writeX=(writeX+1)%specW;

  // full clear + blurred blit of the ring buffer (smooth look)
  X.fillStyle=`rgb(${bg[0]},${bg[1]},${bg[2]})`; X.fillRect(0,0,W,H);
  X.save();
  try{X.filter='blur(1.1px) contrast(1.05)';}catch(_){}
  X.drawImage(spec,0,0,specW,specH,0,0,W,H);
  X.filter='none';
  X.restore();

  // bright write-head seam (the cyan / yellow vertical line in the captures)
  const sx=writeX/specW*W;
  X.save();
  if(opt.glow){X.shadowBlur=14;X.shadowColor=col.peak;}
  X.strokeStyle=col.peak;X.lineWidth=2;
  X.beginPath();X.moveTo(sx,0);X.lineTo(sx,H);X.stroke();
  X.restore();
}

/* ---------- WAVEFORM ---------- */
function drawWave(){
  const barC=rgb(col.bar),peakC=rgb(col.peak),len=timeData.length;
  const yOf=i=>(timeD[i]/255)*H;
  X.lineJoin='round';X.lineCap='round';
  // filled area
  X.beginPath();X.moveTo(0,yOf(0));
  for(let i=1;i<len;i++)X.lineTo(i/len*W,yOf(i));
  X.lineTo(W,H);X.lineTo(0,H);X.closePath();
  X.fillStyle=`rgba(${barC[0]},${barC[1]},${barC[2]},.10)`;X.fill();
  // glowing stroke
  if(opt.glow){X.shadowBlur=14;X.shadowColor=col.peak;}
  const g=X.createLinearGradient(0,0,W,0);
  g.addColorStop(0,col.bar);g.addColorStop(.5,col.peak);g.addColorStop(1,col.bar);
  X.strokeStyle=g;X.lineWidth=2.2;
  X.beginPath();X.moveTo(0,yOf(0));
  for(let i=1;i<len;i++)X.lineTo(i/len*W,yOf(i));
  X.stroke();X.shadowBlur=0;
}

/* ---------- RADIAL ---------- */
function drawRadial(N){
  const cx=W/2,cy=H/2,base=Math.min(W,H)*.15,maxR=Math.min(W,H)*.42;
  const steps=Math.min(360,Math.floor(N*0.6));
  const barC=rgb(col.bar),peakC=rgb(col.peak);
  X.lineCap='round';
  if(opt.glow){X.shadowBlur=10;X.shadowColor=col.bar;}
  for(let i=0;i<steps;i++){
    const b=binAt(i,steps,Math.floor(N*0.7));const v=freqD[b]/255;
    const a=i/steps*Math.PI*2-Math.PI/2;
    const r2=base+v*(maxR-base);
    const c=mix(barC,peakC,v);
    X.strokeStyle=`rgba(${c[0]|0},${c[1]|0},${c[2]|0},${.3+v*.7})`;
    X.lineWidth=Math.max(1.5,(Math.PI*2*base/steps)*.7);
    X.beginPath();
    X.moveTo(cx+Math.cos(a)*base,cy+Math.sin(a)*base);
    X.lineTo(cx+Math.cos(a)*r2,cy+Math.sin(a)*r2);
    X.stroke();
  }
  X.shadowBlur=0;
  X.beginPath();X.arc(cx,cy,base*.6,0,Math.PI*2);
  X.fillStyle=`rgba(${barC[0]},${barC[1]},${barC[2]},.10)`;X.fill();
  X.strokeStyle=`rgba(${peakC[0]},${peakC[1]},${peakC[2]},.3)`;X.lineWidth=1;X.stroke();
}

/* ---------- PARTICLES (additive glow) ---------- */
function drawParticles(N){
  const barC=rgb(col.bar),peakC=rgb(col.peak);
  let e=0;for(let i=0;i<64;i++)e+=freqD[i];e/=64*255;
  X.globalCompositeOperation='lighter';
  const spawn=Math.floor(e*14);
  for(let i=0;i<spawn&&particles.length<700;i++){
    const b=Math.floor(Math.random()*N);const v=freqD[b]/255;if(v<.05)continue;
    const a=Math.random()*Math.PI*2,sp=.5+v*3.5;const c=mix(barC,peakC,v);
    particles.push({x:W/2,y:H/2,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,
      dc:.005+Math.random()*.015,sz:1+v*4.5,r:c[0],g:c[1],b:c[2]});
  }
  for(let i=particles.length-1;i>=0;i--){const p=particles[i];
    p.x+=p.vx;p.y+=p.vy;p.vx*=.99;p.vy*=.99;p.life-=p.dc;
    if(p.life<=0){particles.splice(i,1);continue;}
    X.beginPath();X.arc(p.x,p.y,p.sz*p.life,0,Math.PI*2);
    X.fillStyle=`rgba(${p.r|0},${p.g|0},${p.b|0},${p.life*.8})`;X.fill();
  }
  X.globalCompositeOperation='source-over';
  const rg=X.createRadialGradient(W/2,H/2,0,W/2,H/2,70);
  rg.addColorStop(0,`rgba(${barC[0]},${barC[1]},${barC[2]},${e*.35})`);rg.addColorStop(1,'transparent');
  X.fillStyle=rg;X.fillRect(W/2-70,H/2-70,140,140);
}
